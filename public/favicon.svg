<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with rounded corners -->
  <rect width="100" height="100" fill="#2563eb" rx="25"/>
  
  <!-- Inner circle for better contrast -->
  <circle cx="50" cy="50" r="35" fill="#1d4ed8"/>
  
  <!-- Big white H letter -->
  <text x="50" y="65" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="900" text-anchor="middle" fill="white" letter-spacing="2">H</text>
  
  <!-- Subtle shadow effect -->
  <text x="52" y="67" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="900" text-anchor="middle" fill="#1e3a8a" opacity="0.3">H</text>
</svg>