[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

# Redirects for Next.js API routes to external API
[[redirects]]
  from = "/api/woocommerce/*"
  to = "https://api.informaniak.com/api/woocommerce/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/tutor/*"
  to = "https://api.informaniak.com/api/tutor/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/wordpress/*"
  to = "https://api.informaniak.com/api/wordpress/:splat"
  status = 200
  force = true

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and CORS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CORS headers for WooCommerce API
[[headers]]
  for = "/api/woocommerce/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type, X-Requested-With"

# Functions configuration
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Edge functions for better performance
[[edge_functions]]
  function = "api-proxy"
  path = "/api/*"
